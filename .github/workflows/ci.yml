name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + typecheck (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project + dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint + typecheck
        run: ./scripts/check.sh

  test-fast:
    name: Fast tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project + dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run fast tests
        run: ./scripts/test_fast.sh

  package:
    name: Packaging sanity (py3.12)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iamscope-dist
          path: dist/*
          retention-days: 14

  test-full:
    name: Full tests (py3.12)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-fast]
    if: github.event_name != 'pull_request' || github.base_ref == 'main' || github.base_ref == 'master'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project + dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run full test suite
        run: ./scripts/test_full.sh
